<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;700&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, applyActionCode } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9FggT0dT3koZiehO1TZesW40mvH1kSCc",
            authDomain: "anitoono-77521.firebaseapp.com",
            projectId: "anitoono-77521"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        async function handleVerify() {
            const urlParams = new URLSearchParams(window.location.search);
            const oobCode = urlParams.get('oobCode');
            const statusText = document.getElementById('status-text');
            const titleText = document.getElementById('title');
            const loader = document.getElementById('loader');
            const icon = document.getElementById('success-icon');

            if (oobCode) {
                try {
                    await applyActionCode(auth, oobCode);
                    loader.style.display = "none";
                    icon.style.display = "block";
                    titleText.innerText = "Verified";
                    statusText.innerText = "Your account is now fully active. You may return to the application.";
                } catch (error) {
                    loader.style.display = "none";
                    titleText.innerText = "Expired";
                    statusText.innerText = "This verification link is invalid or has already been used.";
                }
            } else {
                loader.style.display = "none";
                statusText.innerText = "Direct access restricted. Please use the link sent to your email.";
            }
        }
        window.onload = handleVerify;
    </script>

    <style>
        :root {
            --bg: #0f0f0f;
            --card-bg: rgba(20, 20, 20, 0.7);
            --accent: #ff3c3c;
            --text-main: #ffffff;
            --text-dim: #999999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* Animated Background Blobs */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 60, 60, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 60px 40px;
            border-radius: 40px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 1rem; 
            font-weight: 700; 
            letter-spacing: -1.5px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { 
            font-size: 1.05rem; 
            line-height: 1.6; 
            color: var(--text-dim);
            font-weight: 300; 
        }

        /* Minimalist Loader */
        .loader {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 60, 60, 0.2);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            display: inline-block;
            animation: spin 0.8s linear infinite;
            margin-bottom: 30px;
        }

        /* Success Icon Animation */
        #success-icon {
            display: none;
            width: 50px;
            height: 50px;
            margin: 0 auto 30px;
            color: var(--accent);
            animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes scaleUp { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="glass-card">
        <div class="loader" id="loader"></div>
        <svg id="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <h1 id="title">Authenticating</h1>
        <p id="status-text">Securing your account access...</p>
    </div>

</body>
</html>
