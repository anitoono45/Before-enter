<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Email Verified</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, applyActionCode } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9FggT0dT3koZiehO1TZesW40mvH1kSCc",
            authDomain: "anitoono-77521.firebaseapp.com",
            projectId: "anitoono-77521"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        async function handleVerify() {
            const urlParams = new URLSearchParams(window.location.search);
            const oobCode = urlParams.get('oobCode');
            const statusText = document.getElementById('status-text');
            const titleText = document.getElementById('title');
            const loader = document.getElementById('loader');

            if (oobCode) {
                try {
                    await applyActionCode(auth, oobCode);
                    loader.style.display = "none";
                    titleText.innerText = "Verified!";
                    statusText.innerText = "Your account is ready. You can close this window and return to the app.";
                } catch (error) {
                    loader.style.display = "none";
                    titleText.innerText = "Oops!";
                    statusText.innerText = "This link is invalid or has expired.";
                }
            } else {
                loader.style.display = "none";
                statusText.innerText = "No verification code found.";
            }
        }
        window.onload = handleVerify;
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        h1 { font-size: 2rem; margin-bottom: 1rem; font-weight: 700; letter-spacing: -0.5px; }
        p { font-size: 1.1rem; line-height: 1.6; opacity: 0.9; font-weight: 300; }

        /* Aesthetic Loader */
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <span class="loader" id="loader"></span>
        <h1 id="title">Verifying</h1>
        <p id="status-text">Checking your credentials...</p>
    </div>

</body>
</html>
