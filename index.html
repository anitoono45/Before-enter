<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Account Action</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;700&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // IMPORT checkActionCode and confirmPasswordReset
        import { getAuth, applyActionCode, checkActionCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9FggT0dT3koZiehO1TZesW40mvH1kSCc",
            authDomain: "anitoono-77521.firebaseapp.com",
            projectId: "anitoono-77521"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // UI Elements
        const loader = document.getElementById('loader');
        const icon = document.getElementById('success-icon');
        const titleText = document.getElementById('title');
        const statusText = document.getElementById('status-text');
        const resetForm = document.getElementById('reset-form');
        const passwordInput = document.getElementById('new-password');
        const saveBtn = document.getElementById('save-btn');

        async function handleAction() {
            const urlParams = new URLSearchParams(window.location.search);
            const oobCode = urlParams.get('oobCode');

            if (!oobCode) {
                showError("Error", "Direct access restricted. Please use the link sent to your email.");
                return;
            }

            try {
                // 1. Check what kind of code this is (Verify Email or Reset Password)
                const info = await checkActionCode(auth, oobCode);

                if (info.operation === 'VERIFY_EMAIL') {
                    // --- FLOW A: Verify Email ---
                    await applyActionCode(auth, oobCode);
                    showSuccess("Verified", "Your account is now fully active. You may return to the application.");
                
                } else if (info.operation === 'PASSWORD_RESET') {
                    // --- FLOW B: Password Reset ---
                    loader.style.display = "none";
                    titleText.innerText = "Reset Password";
                    statusText.innerText = "Please enter your new password below.";
                    resetForm.style.display = "block"; // Show the password input

                    // Handle Save Password Button
                    saveBtn.onclick = async () => {
                        const newPassword = passwordInput.value;
                        if(newPassword.length < 6) {
                            alert("Password must be at least 6 characters long.");
                            return;
                        }

                        // Show loader while updating
                        resetForm.style.display = "none";
                        loader.style.display = "inline-block";
                        titleText.innerText = "Updating...";
                        statusText.innerText = "Securing your new password...";

                        try {
                            await confirmPasswordReset(auth, oobCode, newPassword);
                            showSuccess("Password Updated", "Your password has been successfully changed! You can now log in.");
                        } catch (err) {
                            showError("Error", err.message.replace("Firebase: ", ""));
                        }
                    };
                } else {
                    showError("Invalid Link", "This action is not supported.");
                }

            } catch (error) {
                // If the code is expired or already used, it will throw an error immediately here
                showError("Expired", "This link is invalid or has already been used.");
            }
        }

        // Helper functions for UI
        function showSuccess(title, msg) {
            loader.style.display = "none";
            resetForm.style.display = "none";
            icon.style.display = "block";
            titleText.innerText = title;
            statusText.innerText = msg;
        }

        function showError(title, msg) {
            loader.style.display = "none";
            resetForm.style.display = "none";
            icon.style.display = "none";
            titleText.innerText = title;
            statusText.innerText = msg;
        }

        window.onload = handleAction;
    </script>

    <style>
        :root {
            --bg: #0f0f0f;
            --card-bg: rgba(20, 20, 20, 0.7);
            --accent: #ff3c3c;
            --text-main: #ffffff;
            --text-dim: #999999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* Animated Background Blobs */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 60, 60, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 60px 40px;
            border-radius: 40px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 1rem; 
            font-weight: 700; 
            letter-spacing: -1.5px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { 
            font-size: 1.05rem; 
            line-height: 1.6; 
            color: var(--text-dim);
            font-weight: 300; 
        }

        /* Minimalist Loader */
        .loader {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 60, 60, 0.2);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            display: inline-block;
            animation: spin 0.8s linear infinite;
            margin-bottom: 30px;
        }

        /* Success Icon Animation */
        #success-icon {
            display: none;
            width: 50px;
            height: 50px;
            margin: 0 auto 30px;
            color: var(--accent);
            animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Inputs & Buttons for Reset Password */
        #reset-form {
            display: none; /* Hidden by default */
            margin-top: 25px;
        }

        input[type="password"] {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(255, 60, 60, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes scaleUp { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="glass-card">
        <div class="loader" id="loader"></div>
        
        <svg id="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>

        <h1 id="title">Authenticating</h1>
        <p id="status-text">Securing your request...</p>

        <!-- Only visible if the link is a Password Reset Link -->
        <div id="reset-form">
            <input type="password" id="new-password" placeholder="Enter new password" minlength="6">
            <button id="save-btn">Save Password</button>
        </div>
    </div>

</body>
</html>
